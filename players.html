<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Players — XBFF</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand"><i class="fa-solid fa-futbol"></i> XBFF</a>
    <ul class="nav-links">
      <li><a href="index.html" data-page="home"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="players.html" data-page="players"><i class="fa-solid fa-users"></i> Players</a></li>
      <li><a href="matches.html" data-page="matches"><i class="fa-solid fa-calendar"></i> Matches</a></li>
      <li><a href="statistics.html" data-page="stats"><i class="fa-solid fa-chart-line"></i> Statistics</a></li>
      <li><a href="awards.html" data-page="awards"><i class="fa-solid fa-medal"></i> Awards</a></li>
    </ul>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1><i class="fa-solid fa-users"></i> Players</h1>
      <p>League standings — ranked by total points</p>
    </div>

    <div class="table-wrapper">
      <table class="standings-table" id="players-table">
        <thead>
          <tr>
            <th>#</th>
            <th class="player-name-header">Player</th>
            <th data-sort="matchesPlayed">Matches <span class="sort-arrow"></span></th>
            <th data-sort="goals">Goals <span class="sort-arrow"></span></th>
            <th data-sort="assists">Assists <span class="sort-arrow"></span></th>
            <th data-sort="saves">Saves <span class="sort-arrow"></span></th>
            <th data-sort="dribbles">Dribbles <span class="sort-arrow"></span></th>
            <th data-sort="offsides">Offsides <span class="sort-arrow"></span></th>
            <th data-sort="yellowCards">Yellow <span class="sort-arrow"></span></th>
            <th data-sort="redCards">Red <span class="sort-arrow"></span></th>
            <th data-sort="totalPoints">Points <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="players-tbody">
          <tr><td colspan="11"><div class="loading">Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="footer">
    <p>XBFF</p>
  </footer>

  <script type="module" src="js/players-page.js"></script>
</body>
</html>
