<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Details — XBFF</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand"><i class="fa-solid fa-futbol"></i> XBFF</a>
    <ul class="nav-links">
      <li><a href="index.html" data-page="home"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="players.html" data-page="players"><i class="fa-solid fa-users"></i> Players</a></li>
      <li><a href="matches.html" data-page="matches"><i class="fa-solid fa-calendar"></i> Matches</a></li>
      <li><a href="statistics.html" data-page="stats"><i class="fa-solid fa-chart-line"></i> Statistics</a></li>
      <li><a href="awards.html" data-page="awards"><i class="fa-solid fa-medal"></i> Awards</a></li>
    </ul>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <p><a href="matches.html" style="color:var(--text-secondary)"><i class="fa-solid fa-arrow-left"></i> Back to Matches</a></p>
    </div>

    <div id="match-detail">
      <div class="loading">Loading...</div>
    </div>

    <div class="grid-2" style="margin-top:2rem">
      <div class="card">
        <div class="card-header"><h2><i class="fa-solid fa-clock"></i> Timeline</h2></div>
        <div class="timeline" id="match-timeline">
          <div class="loading">Loading...</div>
        </div>
      </div>

      <div>
        <div class="card" style="margin-bottom:1rem">
          <div class="card-header"><h2><i class="fa-solid fa-users"></i> Team A Roster</h2></div>
          <div class="roster-list" id="teamA-roster"></div>
        </div>
        <div class="card">
          <div class="card-header"><h2><i class="fa-solid fa-users"></i> Team B Roster</h2></div>
          <div class="roster-list" id="teamB-roster"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>XBFF</p>
  </footer>

  <script type="module" src="js/match-page.js"></script>
</body>
</html>
