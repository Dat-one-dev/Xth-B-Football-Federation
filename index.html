<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XBFF</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand"><i class="fa-solid fa-futbol"></i> XBFF</a>
    <ul class="nav-links">
      <li><a href="index.html" data-page="home"><i class="fa-solid fa-house"></i> Home</a></li>
      <li><a href="players.html" data-page="players"><i class="fa-solid fa-users"></i> Players</a></li>
      <li><a href="matches.html" data-page="matches"><i class="fa-solid fa-calendar"></i> Matches</a></li>
      <li><a href="statistics.html" data-page="stats"><i class="fa-solid fa-chart-line"></i> Statistics</a></li>
      <li><a href="awards.html" data-page="awards"><i class="fa-solid fa-medal"></i> Awards</a></li>
    </ul>
    <button class="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Dashboard</h1>
      <p>Season overview and latest results</p>
    </div>

    <div class="stat-grid" id="overview-stats">
      <div class="loading">Loading...</div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <h2><i class="fa-solid fa-trophy"></i> Leaderboard</h2>
          <a href="awards.html" class="badge badge-blue">View All</a>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>#</th><th>Player</th><th>Pts</th><th>Goals</th><th>Assists</th></tr></thead>
            <tbody id="leaderboard-body"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2><i class="fa-solid fa-calendar"></i> Recent Matches</h2>
          <a href="matches.html" class="badge badge-blue">View All</a>
        </div>
        <div class="grid-4" id="recent-matches" style="margin-bottom:0">
          <div class="loading">Loading...</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>XBFF</p>
  </footer>

  <script type="module" src="js/home.js"></script>
</body>
</html>
